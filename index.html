<!doctype html>
<html lang="tr">

<head>
  <meta charset="UTF-8" />

  <!-- Favicon -->
  <link id="favicon" rel="icon" type="image/png" sizes="64x64" href="/favicon-light.png" />
  <link rel="shortcut icon" href="/favicon-light.png" />
  <!-- Apple Touch Icon -->
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
  <!-- Favicon dark/light switcher (Chrome, Firefox, Edge, Windows) -->
  <script>
    (function () {
      function setFavicon(dark) {
        var el = document.getElementById('favicon');
        var url = dark ? '/favicon-dark.png' : '/favicon-light.png';
        if (el) el.href = url;
      }
      var mq = window.matchMedia('(prefers-color-scheme: dark)');
      setFavicon(mq.matches);
      mq.addEventListener('change', function (e) { setFavicon(e.matches); });
    })();
  </script>

  <!-- Meta Tags -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#103E6A" media="(prefers-color-scheme: light)" />
  <meta name="theme-color" content="#103E6A" media="(prefers-color-scheme: dark)" />
  <meta name="description"
    content="İyilik Adımı Uluslararası İnsani Yardım Derneği - Dünyanın dört bir yanındaki ihtiyaç sahiplerine umut oluyoruz." />
  <meta name="keywords" content="bağış, yardım, insani yardım, dernek, iyilik adımı" />

  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="İyilik Adımı" />
  <meta property="og:description" content="Dünyanın dört bir yanındaki ihtiyaç sahiplerine umut oluyoruz." />
  <meta property="og:image" content="/favicon.png" />

  <!-- Twitter -->
  <meta name="twitter:card" content="summary" />
  <meta name="twitter:title" content="İyilik Adımı" />
  <meta name="twitter:description" content="Dünyanın dört bir yanındaki ihtiyaç sahiplerine umut oluyoruz." />

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" />
  <title>İyilik Adımı</title>
  <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
</head>
